name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hr
          POSTGRES_PASSWORD: hr
          POSTGRES_DB: hr_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hr -d hr_ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://hr:hr@localhost:5432/hr_ci?schema=public
      TEST_DATABASE_URL: postgresql://hr:hr@localhost:5432/hr_ci?schema=test
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-secret-${{ github.run_id }}-padding-to-32-chars-min
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema
        run: npx prisma db push

      - name: Seed database
        run: npm run db:seed

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage

      - name: Build
        run: npm run build
